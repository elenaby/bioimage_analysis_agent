<!DOCTYPE html>
<html>
<head>
    <title>Pathology Agent UI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        /* LEFT: IMAGE VIEWER */
        #left {
            width: 70%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .image-panel {
            text-align: center;
            color: white;
        }

        .image-panel img {
            max-width: 300px;
            max-height: 300px;
            border: 2px solid #444;
        }

        /* RIGHT PANEL */
        #right {
            width: 30%;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #ccc;
            background: #f5f5f5;
        }

        #welcome {
            padding: 15px;
            border-bottom: 1px solid #ccc;
            background: #ffffff;
        }

        #chat {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 10px;
        }

        .user {
            color: blue;
        }

        .system {
            color: green;
        }

        #controls {
            padding: 10px;
            border-top: 1px solid #ccc;
            background: #fff;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- LEFT PANEL -->
<div id="left">

    <div class="image-panel">
        <h3>Before</h3>
        <img id="beforeImage" src="/static/welcome.png">
    </div>

    <div class="image-panel">
        <h3>After</h3>
        <img id="afterImage" src="/static/welcome.png">
    </div>

</div>

<!-- RIGHT PANEL -->
<div id="right">

    <!-- WELCOME -->
    <div id="welcome">
        <h2>🔬 Pathology Agent</h2>
        <p>Upload an image and run commands.</p>
    </div>

    <!-- CHAT -->
    <div id="chat"></div>

    <!-- CONTROLS -->
    <div id="controls">
        <input type="file" id="fileInput" accept="image/png, image/jpeg">
        <input type="text" id="userInput" placeholder="Type command...">
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
async function send() {
    const input = document.getElementById("userInput").value;
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    const chat = document.getElementById("chat");

    if (!file) {
        alert("Upload an image first.");
        return;
    }

    if (!input) {
        alert("Enter a command.");
        return;
    }

    chat.innerHTML += `<div class="message user"><b>You:</b> ${input}</div>`;

    const loadingId = Date.now();
    chat.innerHTML += `<div id="loading-${loadingId}" class="message system">⏳ Processing...</div>`;

    const formData = new FormData();
    formData.append("message", input);
    formData.append("file", file);

    try {
        const response = await fetch("/chat", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        document.getElementById(`loading-${loadingId}`).remove();

        console.log("API response:", data);

        if (data.error) {
            chat.innerHTML += `<div class="message system">❌ ${data.error}</div>`;
            return;
        }

        const beforeImg = document.getElementById("beforeImage");
        const afterImg = document.getElementById("afterImage");

        // Clear images first (prevents stale rendering)
        beforeImg.src = "";
        afterImg.src = "";

        // Set new images
        beforeImg.src = data.before;
        afterImg.src = data.after;

        chat.innerHTML += `<div class="message system">✅ Image updated</div>`;
        chat.scrollTop = chat.scrollHeight;

    } catch (err) {
        chat.innerHTML += `<div class="message system">❌ Request failed</div>`;
    }

    document.getElementById("userInput").value = "";
}

// Enter key support
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>

</body>
</html>
