```

</div>

<script>
async function send() {
    const input = document.getElementById("userInput").value;
    const file = document.getElementById("fileInput").files[0];
    const chat = document.getElementById("chat");

    if (!file) {
        alert("Please upload an image first.");
        return;
    }

    if (!input) {
        alert("Please enter a command.");
        return;
    }

    // Show user message
    chat.innerHTML += `<div class="message user"><b>You:</b> ${input}</div>`;

    // Show loading message
    const loadingId = Date.now();
    chat.innerHTML += `<div id="loading-${loadingId}" class="message system">⏳ Processing...</div>`;

    const formData = new FormData();
    formData.append("message", input);
    formData.append("file", file);

    try {
        const response = await fetch("/chat", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        // Remove loading message
        document.getElementById(`loading-${loadingId}`).remove();

        if (data.error) {
            chat.innerHTML += `<div class="message system">❌ Error: ${data.error}</div>`;
            return;
        }

        // Update image
        const img = document.getElementById("image");
        img.style.opacity = 0.5;
        img.src = data.result + "?t=" + new Date().getTime();

        setTimeout(() => {
            img.style.opacity = 1;
        }, 200);

        // System message
        chat.innerHTML += `<div class="message system">✅ Image updated</div>`;

        chat.scrollTop = chat.scrollHeight;

    } catch (err) {
        chat.innerHTML += `<div class="message system">❌ Request failed</div>`;
    }

    document.getElementById("userInput").value = "";
}

// Enter key support
document.getElementById("userInput")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>

</body>
